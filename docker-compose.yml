services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - ./apps/web/.env.local
    environment:
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://api:3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rentars

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./apps/backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3001
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rentars

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rentars

networks:
  rentars:
    driver: bridge
