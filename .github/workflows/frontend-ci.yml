name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'biome.json'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'biome.json'
      - '.github/workflows/frontend-ci.yml'

jobs:
  frontend-ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('apps/web/package.json', 'package-lock.json') }}-${{ hashFiles('apps/web/**/*.ts', 'apps/web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('apps/web/package.json', 'package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Run Biome check
        working-directory: .
        run: npx biome check apps/web

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_PASSKEY_RP_ID: localhost
          NEXT_PUBLIC_PASSKEY_RP_NAME: Rentars
          NEXT_PUBLIC_PASSKEY_ORIGIN: http://localhost:3001
